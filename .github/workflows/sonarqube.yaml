name: Sonarqube pipeline

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  sonarqube:
     runs-on: [self-hosted, wsl-salim]

     steps:
       - name: Clone code
         uses: actions/checkout@v7

       - name: Sonarqube Scan
         uses: SonarSource/sonarqube-scan-action@v8
         with:
           args: >
              -Dsonar.projectKey=NodeApp 
              -Dsonar.sources=. 
              -Dsonar.host.url=https://unlisted-canon-glancing.ngrok-free.dev 
              -Dsonar.login=sqp_e313110d8e5feeaa4d499ea229c3be9aaf39b96a
